<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Data Mahasiswa</title>

    <script src="https://cdn.tailwindcss.com"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 antialiased min-h-screen flex flex-col justify-center py-10">

    <div class="max-w-2xl w-full mx-auto px-4 sm:px-6">

        <a href="/" class="inline-flex items-center gap-2 text-sm font-medium text-slate-500 hover:text-indigo-600 transition-colors mb-6 group">
            <i class="fa-solid fa-arrow-left transition-transform group-hover:-translate-x-1"></i>
            Kembali ke Dashboard
        </a>

        <div class="mb-6">
            <h1 class="text-2xl font-bold text-slate-900 flex items-center gap-3">
                <div class="w-10 h-10 bg-indigo-100 text-indigo-600 rounded-lg flex items-center justify-center">
                    <i class="fa-solid fa-user-pen"></i>
                </div>
                Edit Data Mahasiswa
            </h1>
            <p class="text-slate-500 mt-2 text-sm">
                Perbarui informasi untuk mahasiswa <span class="font-semibold text-slate-700">{{ mhs.nama }}</span>.
            </p>
        </div>

        <div class="bg-white rounded-2xl shadow-sm border border-slate-200/60 p-6 sm:p-8 relative overflow-hidden">
            
            <div class="absolute top-0 left-0 w-full h-1.5 bg-indigo-600"></div>

            <form action="/update/{{ mhs.id }}" method="POST" class="space-y-5">

                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1.5">
                        <i class="fa-solid fa-id-card text-slate-400 mr-1.5"></i> Nomor Induk Mahasiswa (NIM)
                    </label>
                    <input
                        type="text"
                        name="nim"
                        value="{{ mhs.nim }}"
                        required
                        class="w-full bg-slate-50 border border-slate-300 rounded-lg px-4 py-2.5 text-sm font-medium focus:bg-white focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition-all duration-200 text-slate-900"
                    >
                </div>

                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1.5">
                        <i class="fa-regular fa-user text-slate-400 mr-1.5"></i> Nama Lengkap
                    </label>
                    <input
                        type="text"
                        name="nama"
                        value="{{ mhs.nama }}"
                        required
                        class="w-full bg-slate-50 border border-slate-300 rounded-lg px-4 py-2.5 text-sm focus:bg-white focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition-all duration-200 text-slate-900"
                    >
                </div>

                <div class="grid grid-cols-1 sm:grid-cols-2 gap-5">
                    
                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-1.5">
                            <i class="fa-solid fa-book text-slate-400 mr-1.5"></i> Program Studi
                        </label>
                        <input
                            type="text"
                            name="prodi"
                            value="{{ mhs.prodi }}"
                            required
                            class="w-full bg-slate-50 border border-slate-300 rounded-lg px-4 py-2.5 text-sm focus:bg-white focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition-all duration-200 text-slate-900"
                        >
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-1.5">
                            <i class="fa-regular fa-calendar text-slate-400 mr-1.5"></i> Angkatan
                        </label>
                        <input
                            type="number"
                            name="angkatan"
                            value="{{ mhs.angkatan }}"
                            required
                            class="w-full bg-slate-50 border border-slate-300 rounded-lg px-4 py-2.5 text-sm focus:bg-white focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition-all duration-200 text-slate-900"
                        >
                    </div>

                </div>

                <hr class="border-slate-100 my-6">

                <div class="flex flex-col sm:flex-row-reverse gap-3 pt-2">
                    
                    <button
                        type="submit"
                        class="w-full sm:w-auto bg-indigo-600 hover:bg-indigo-700 text-white px-6 py-2.5 rounded-lg text-sm font-semibold shadow-sm hover:shadow transition-all duration-200 flex items-center justify-center gap-2"
                    >
                        <i class="fa-solid fa-check"></i>
                        Simpan Perubahan
                    </button>

                    <a
                        href="/"
                        class="w-full sm:w-auto bg-white border border-slate-300 hover:bg-slate-50 text-slate-700 px-6 py-2.5 rounded-lg text-sm font-semibold transition-all duration-200 flex items-center justify-center gap-2"
                    >
                        Batal
                    </a>

                </div>

            </form>

        </div>

    </div>

</body>
</html>

<!doctype html>
<html lang="id">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sistem Akademik Kampus</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { darkMode: 'class' }
        if (localStorage.getItem('color-theme') === 'dark' || (!('color-theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        } else {
            document.documentElement.classList.remove('dark');
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style> body { font-family: 'Inter', sans-serif; } </style>
</head>
<body class="bg-slate-50 dark:bg-slate-900 text-slate-800 dark:text-slate-100 antialiased min-h-screen flex flex-col transition-colors duration-300">
    
    <nav class="bg-indigo-600 dark:bg-slate-800 shadow-md transition-colors duration-300 border-b border-indigo-700 dark:border-slate-700">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between h-16">
                <div class="flex items-center gap-3 text-white">
                    <i class="fa-solid fa-graduation-cap text-2xl"></i>
                    <span class="font-bold text-xl tracking-wide">Sistem Akademik</span>
                </div>

                <div class="flex items-center gap-2 sm:gap-4">
                    <button id="theme-toggle" class="text-white hover:bg-indigo-700 dark:hover:bg-slate-700 p-2 rounded-lg transition-colors focus:outline-none">
                        <i id="theme-toggle-dark-icon" class="fa-solid fa-moon hidden text-lg"></i>
                        <i id="theme-toggle-light-icon" class="fa-solid fa-sun hidden text-lg"></i>
                    </button>
                    <button onclick="logout()" class="text-white hover:text-red-200 hover:bg-indigo-700 dark:hover:bg-slate-700 px-4 py-2 rounded-lg text-sm font-medium transition-colors flex items-center gap-2">
                        <i class="fa-solid fa-right-from-bracket"></i>
                        <span class="hidden sm:inline">Logout</span>
                    </button>
                </div>
            </div>
        </div>
    </nav>

    <main class="flex-grow max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8 w-full">
        <div class="mb-8 flex flex-col sm:flex-row sm:items-end justify-between gap-4">
            <div>
                <h1 class="text-2xl font-bold text-slate-900 dark:text-white">Kelola Data Mahasiswa</h1>
                <p class="text-slate-500 dark:text-slate-400 mt-1 text-sm">Tambahkan, ubah, atau hapus data mahasiswa aktif.</p>
            </div>
        </div>

        <div class="grid lg:grid-cols-3 gap-8">
            <div class="lg:col-span-1">
                <div class="bg-white dark:bg-slate-800 rounded-2xl shadow-sm border border-slate-200/60 dark:border-slate-700 p-6 relative overflow-hidden transition-colors duration-300">
                    <div class="absolute top-0 left-0 w-full h-1.5 bg-indigo-600"></div>
                    <h2 class="text-lg font-semibold text-slate-800 dark:text-white mb-5 flex items-center gap-2"><i class="fa-solid fa-user-plus text-indigo-600 dark:text-indigo-400"></i> Tambah Mahasiswa</h2>

                    <form id="formTambah" class="space-y-4">
                        <div>
                            <label class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-1.5">NIM</label>
                            <input type="text" id="nim" required placeholder="Contoh: 241080200094" class="w-full bg-slate-50 dark:bg-slate-700 border border-slate-300 dark:border-slate-600 rounded-lg px-4 py-2.5 text-sm dark:text-white focus:bg-white dark:focus:bg-slate-800 focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition-all duration-200 placeholder:text-slate-400">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-1.5">Nama Lengkap</label>
                            <input type="text" id="nama" required placeholder="Contoh: Muchammad Imaduddin Ramadhani" class="w-full bg-slate-50 dark:bg-slate-700 border border-slate-300 dark:border-slate-600 rounded-lg px-4 py-2.5 text-sm dark:text-white focus:bg-white dark:focus:bg-slate-800 focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition-all duration-200 placeholder:text-slate-400">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-1.5">Program Studi</label>
                            <input type="text" id="prodi" required placeholder="Contoh: Teknik Informatika" class="w-full bg-slate-50 dark:bg-slate-700 border border-slate-300 dark:border-slate-600 rounded-lg px-4 py-2.5 text-sm dark:text-white focus:bg-white dark:focus:bg-slate-800 focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition-all duration-200 placeholder:text-slate-400">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-1.5">Angkatan</label>
                            <input type="number" id="angkatan" required placeholder="Contoh: 2024" class="w-full bg-slate-50 dark:bg-slate-700 border border-slate-300 dark:border-slate-600 rounded-lg px-4 py-2.5 text-sm dark:text-white focus:bg-white dark:focus:bg-slate-800 focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition-all duration-200 placeholder:text-slate-400">
                        </div>
                        <button type="submit" class="w-full mt-2 bg-indigo-600 hover:bg-indigo-700 text-white py-2.5 rounded-lg text-sm font-semibold shadow-sm hover:shadow transition-all duration-200 flex items-center justify-center gap-2">
                            <i class="fa-solid fa-save"></i> Simpan Data
                        </button>
                    </form>
                </div>
            </div>

            <div class="lg:col-span-2">
                <div class="bg-white dark:bg-slate-800 rounded-2xl shadow-sm border border-slate-200/60 dark:border-slate-700 overflow-hidden flex flex-col h-full transition-colors duration-300">
                    <div class="px-6 py-5 border-b border-slate-100 dark:border-slate-700 flex justify-between items-center bg-white dark:bg-slate-800">
                        <h2 class="text-lg font-semibold text-slate-800 dark:text-white flex items-center gap-2"><i class="fa-solid fa-users text-indigo-600 dark:text-indigo-400"></i> Daftar Mahasiswa</h2>
                        <span id="totalData" class="bg-indigo-50 dark:bg-slate-700 text-indigo-700 dark:text-indigo-300 border border-indigo-100 dark:border-slate-600 px-3 py-1 rounded-full text-xs font-semibold flex items-center gap-1.5"> <i class="fa-solid fa-database"></i> Memuat... </span>
                    </div>

                    <div class="overflow-x-auto">
                        <table class="w-full text-left text-sm whitespace-nowrap">
                            <thead class="bg-slate-50/80 dark:bg-slate-700/50 text-slate-500 dark:text-slate-300 uppercase tracking-wider text-xs font-semibold border-b border-slate-200/60 dark:border-slate-700">
                                <tr>
                                    <th class="px-6 py-4">NIM</th>
                                    <th class="px-6 py-4">Nama Mahasiswa</th>
                                    <th class="px-6 py-4">Program Studi</th>
                                    <th class="px-6 py-4">Angkatan</th>
                                    <th class="px-6 py-4 text-center">Aksi</th>
                                </tr>
                            </thead>
                            <tbody id="tabelMahasiswa" class="divide-y divide-slate-100 dark:divide-slate-700/50 text-slate-600 dark:text-slate-300"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </main>


<script>
    // 1. INISIALISASI DARK MODE LOGIC
    const themeToggleDarkIcon = document.getElementById('theme-toggle-dark-icon');
    const themeToggleLightIcon = document.getElementById('theme-toggle-light-icon');
    const themeToggleBtn = document.getElementById('theme-toggle');

    if (document.documentElement.classList.contains('dark')) {
        themeToggleLightIcon.classList.remove('hidden');
    } else {
        themeToggleDarkIcon.classList.remove('hidden');
    }

    themeToggleBtn.addEventListener('click', function() {
        themeToggleDarkIcon.classList.toggle('hidden');
        themeToggleLightIcon.classList.toggle('hidden');

        if (document.documentElement.classList.contains('dark')) {
            document.documentElement.classList.remove('dark');
            localStorage.setItem('color-theme', 'light');
        } else {
            document.documentElement.classList.add('dark');
            localStorage.setItem('color-theme', 'dark');
        }
    });

    // 2. PROTEKSI HALAMAN & TOKEN (Diubah menuju index.html)
    const token = localStorage.getItem('token');
    if (!token) {
        window.location.href = 'index.html';
    }

    // 3. LOGOUT SYSTEM (Diubah menuju index.html)
    function logout() {
        Swal.fire({
            title: 'Keluar Sistem?',
            text: 'Anda harus login kembali untuk mengakses data.',
            icon: 'question',
            showCancelButton: true,
            confirmButtonColor: '#4f46e5',
            cancelButtonColor: '#ef4444',
            confirmButtonText: 'Ya, Keluar',
            background: document.documentElement.classList.contains('dark') ? '#1e293b' : '#fff',
            color: document.documentElement.classList.contains('dark') ? '#fff' : '#545454'
        }).then((result) => {
            if (result.isConfirmed) {
                localStorage.removeItem('token');
                window.location.href = 'index.html';
            }
        });
    }

    const API_URL = 'http://127.0.0.1:5000/api/mahasiswa';

    // 4. LOAD DATA TABEL
    async function loadData() {
        try {
            const response = await fetch(API_URL, {
                headers: { 'Authorization': `Bearer ${token}` }
            });
            const result = await response.json();
            const tbody = document.getElementById('tabelMahasiswa');
            const totalData = document.getElementById('totalData');

            tbody.innerHTML = '';

            if (response.ok && result.status === 'success') {
                const dataList = result.data || [];
                totalData.innerHTML = `<i class="fa-solid fa-database"></i> Total: ${dataList.length} Data`;
                
                if (dataList.length > 0) {
                    dataList.forEach((mhs) => {
                        const row = `
                            <tr class="hover:bg-slate-50 dark:hover:bg-slate-700/30 transition-colors duration-150 group">
                                <td class="px-6 py-4 font-medium text-slate-900 dark:text-slate-100">${mhs.nim}</td>
                                <td class="px-6 py-4">
                                    <div class="flex items-center gap-3">
                                        <div class="w-8 h-8 rounded-full bg-indigo-100 dark:bg-indigo-900/50 text-indigo-600 dark:text-indigo-400 flex items-center justify-center font-bold text-xs">
                                            ${mhs.nama ? mhs.nama.charAt(0).toUpperCase() : '?'}
                                        </div>
                                        <span class="font-medium text-slate-900 dark:text-slate-100">${mhs.nama || '-'}</span>
                                    </div>
                                </td>
                                <td class="px-6 py-4">${mhs.prodi || '-'}</td>
                                <td class="px-6 py-4"><span class="bg-slate-100 dark:bg-slate-700 text-slate-600 dark:text-slate-300 px-2.5 py-1 rounded-md text-xs font-medium">${mhs.angkatan || '-'}</span></td>
                                <td class="px-6 py-4">
                                    <div class="flex justify-center gap-2 opacity-100 sm:opacity-80 group-hover:opacity-100 transition-opacity">
                                        <a href="edit.html?id=${mhs.id}" class="text-amber-600 dark:text-amber-400 bg-amber-50 dark:bg-amber-900/30 hover:bg-amber-100 dark:hover:bg-amber-900/50 border border-amber-200/50 dark:border-amber-700/50 px-3 py-1.5 rounded-md text-xs font-medium transition-colors flex items-center gap-1.5">
                                            <i class="fa-solid fa-pen-to-square"></i> Edit
                                        </a>
                                        <button onclick="hapusData('${mhs.id}', '${mhs.nama}')" class="text-red-600 dark:text-red-400 bg-red-50 dark:bg-red-900/30 hover:bg-red-100 dark:hover:bg-red-900/50 border border-red-200/50 dark:border-red-700/50 px-3 py-1.5 rounded-md text-xs font-medium transition-colors flex items-center gap-1.5">
                                            <i class="fa-solid fa-trash-can"></i> Hapus
                                        </button>
                                    </div>
                                </td>
                            </tr>
                        `;
                        tbody.innerHTML += row;
                    });
                } else {
                    tbody.innerHTML = `<tr><td colspan="5" class="px-6 py-16 text-center text-slate-500 dark:text-slate-400">Belum ada data mahasiswa</td></tr>`;
                }
            } else {
                totalData.innerHTML = `<i class="fa-solid fa-database"></i> Total: 0 Data`;
                Swal.fire('Error!', result.message || 'Gagal memuat data dari server.', 'error');
            }
        } catch (error) {
            Swal.fire('Error!', 'Gagal memuat data dari server. Pastikan API berjalan atau token valid.', 'error');
        }
    }

    // 5. TAMBAH DATA
    document.getElementById('formTambah').addEventListener('submit', async function (e) {
        e.preventDefault();
        const data = {
            nim: document.getElementById('nim').value,
            nama: document.getElementById('nama').value,
            prodi: document.getElementById('prodi').value,
            angkatan: document.getElementById('angkatan').value,
        };

        try {
            const response = await fetch(API_URL, {
                method: 'POST',
                headers: { 
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${token}` 
                },
                body: JSON.stringify(data),
            });
            const result = await response.json();

            if (response.ok && result.status === 'success') {
                Swal.fire({
                    title: 'Berhasil!', text: result.message, icon: 'success',
                    background: document.documentElement.classList.contains('dark') ? '#1e293b' : '#fff',
                    color: document.documentElement.classList.contains('dark') ? '#fff' : '#545454'
                });
                document.getElementById('formTambah').reset();
                loadData();
            } else {
                Swal.fire('Error!', result.message || 'Gagal menyimpan data.', 'error');
            }
        } catch (error) {
            Swal.fire('Error!', 'Gagal menghubungkan ke server.', 'error');
        }
    });

    // 6. HAPUS DATA
    function hapusData(id, nama) {
        Swal.fire({
            title: 'Hapus Data?',
            html: `Anda yakin ingin menghapus data <b>${nama}</b>?`,
            icon: 'warning',
            showCancelButton: true,
            confirmButtonColor: '#ef4444',
            cancelButtonText: 'Batal',
            confirmButtonText: 'Ya, Hapus',
            background: document.documentElement.classList.contains('dark') ? '#1e293b' : '#fff',
            color: document.documentElement.classList.contains('dark') ? '#fff' : '#545454'
        }).then(async (result) => {
            if (result.isConfirmed) {
                try {
                    const response = await fetch(`${API_URL}/${id}`, { 
                        method: 'DELETE',
                        headers: { 'Authorization': `Bearer ${token}` }
                    });
                    const resData = await response.json();

                    if (response.ok && resData.status === 'success') {
                        Swal.fire({
                            title: 'Terhapus!', text: resData.message, icon: 'success',
                            background: document.documentElement.classList.contains('dark') ? '#1e293b' : '#fff',
                            color: document.documentElement.classList.contains('dark') ? '#fff' : '#545454'
                        });
                        loadData();
                    } else {
                        Swal.fire('Error!', resData.message || 'Gagal menghapus data.', 'error');
                    }
                } catch (error) {
                    Swal.fire('Error!', 'Gagal memproses penghapusan data.', 'error');
                }
            }
        });
    }

    document.addEventListener('DOMContentLoaded', loadData);
</script>
</body>
</html>

<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Edit Data Mahasiswa</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = { darkMode: 'class' };
      if (localStorage.getItem('color-theme') === 'dark' || (!('color-theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
        document.documentElement.classList.add('dark');
      } else {
        document.documentElement.classList.remove('dark');
      }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
      body {
        font-family: 'Inter', sans-serif;
      }
    </style>
  </head>
  <body class="bg-slate-50 dark:bg-slate-900 text-slate-800 dark:text-slate-100 antialiased min-h-screen flex flex-col justify-center py-10 transition-colors duration-300">
    <div class="max-w-2xl w-full mx-auto px-4 sm:px-6">
      <a href="index.html" class="inline-flex items-center gap-2 text-sm font-medium text-slate-500 dark:text-slate-400 hover:text-indigo-600 dark:hover:text-indigo-400 transition-colors mb-6 group">
        <i class="fa-solid fa-arrow-left transition-transform group-hover:-translate-x-1"></i> Kembali ke Dashboard
      </a>

      <div class="mb-6">
        <h1 class="text-2xl font-bold text-slate-900 dark:text-white flex items-center gap-3">
          <div class="w-10 h-10 bg-indigo-100 dark:bg-indigo-900/50 text-indigo-600 dark:text-indigo-400 rounded-lg flex items-center justify-center">
            <i class="fa-solid fa-user-pen"></i>
          </div>
          Edit Data Mahasiswa
        </h1>
      </div>

      <div class="bg-white dark:bg-slate-800 rounded-2xl shadow-sm border border-slate-200/60 dark:border-slate-700 p-6 sm:p-8 relative overflow-hidden transition-colors duration-300">
        <div class="absolute top-0 left-0 w-full h-1.5 bg-indigo-600"></div>

        <form id="formEdit" class="space-y-5">
          <div>
            <label class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-1.5">Nomor Induk Mahasiswa (NIM)</label>
            <input
              type="text"
              id="nim"
              required
              class="w-full bg-slate-50 dark:bg-slate-700 border border-slate-300 dark:border-slate-600 rounded-lg px-4 py-2.5 text-sm font-medium dark:text-white focus:bg-white dark:focus:bg-slate-800 focus:ring-2 focus:ring-indigo-500 outline-none transition-all"
            />
          </div>
          <div>
            <label class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-1.5">Nama Lengkap</label>
            <input
              type="text"
              id="nama"
              required
              class="w-full bg-slate-50 dark:bg-slate-700 border border-slate-300 dark:border-slate-600 rounded-lg px-4 py-2.5 text-sm dark:text-white focus:bg-white dark:focus:bg-slate-800 focus:ring-2 focus:ring-indigo-500 outline-none transition-all"
            />
          </div>
          <div class="grid grid-cols-1 sm:grid-cols-2 gap-5">
            <div>
              <label class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-1.5">Program Studi</label>
              <input
                type="text"
                id="prodi"
                required
                class="w-full bg-slate-50 dark:bg-slate-700 border border-slate-300 dark:border-slate-600 rounded-lg px-4 py-2.5 text-sm dark:text-white focus:bg-white dark:focus:bg-slate-800 focus:ring-2 focus:ring-indigo-500 outline-none transition-all"
              />
            </div>
            <div>
              <label class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-1.5">Angkatan</label>
              <input
                type="number"
                id="angkatan"
                required
                class="w-full bg-slate-50 dark:bg-slate-700 border border-slate-300 dark:border-slate-600 rounded-lg px-4 py-2.5 text-sm dark:text-white focus:bg-white dark:focus:bg-slate-800 focus:ring-2 focus:ring-indigo-500 outline-none transition-all"
              />
            </div>
          </div>

          <hr class="border-slate-100 dark:border-slate-700 my-6" />

          <div class="flex flex-col sm:flex-row-reverse gap-3 pt-2">
            <button type="submit" class="w-full sm:w-auto bg-indigo-600 hover:bg-indigo-700 text-white px-6 py-2.5 rounded-lg text-sm font-semibold flex items-center justify-center gap-2 transition-colors">
              <i class="fa-solid fa-check"></i> Simpan Perubahan
            </button>
            <a
              href="index.html"
              class="w-full sm:w-auto bg-white dark:bg-slate-800 border border-slate-300 dark:border-slate-600 hover:bg-slate-50 dark:hover:bg-slate-700 text-slate-700 dark:text-slate-300 px-6 py-2.5 rounded-lg text-sm font-semibold flex items-center justify-center gap-2 transition-colors"
            >
              Batal
            </a>
          </div>
        </form>
      </div>
    </div>

    <script>
      const token = localStorage.getItem('token');
      // 1. Ubah ke index.html (Halaman Login)
      if (!token) window.location.href = 'index.html';

      const API_URL = 'http://127.0.0.1:5000/api/mahasiswa';
      const urlParams = new URLSearchParams(window.location.search);
      const mhsId = urlParams.get('id');

      // 2. Ubah ke dashboard.html
      if (!mhsId) window.location.href = 'dashboard.html';

      async function loadDetail() {
        try {
          const response = await fetch(`${API_URL}/${mhsId}`, {
            headers: { Authorization: `Bearer ${token}` },
          });
          const result = await response.json();

          if (result.status === 'success') {
            document.getElementById('nim').value = result.data.nim;
            document.getElementById('nama').value = result.data.nama;
            document.getElementById('prodi').value = result.data.prodi;
            document.getElementById('angkatan').value = result.data.angkatan;
          } else {
            // 3. Ubah ke dashboard.html
            Swal.fire('Error', 'Data tidak ditemukan', 'error').then(() => (window.location.href = 'dashboard.html'));
          }
        } catch (error) {
          console.error('Error fetching data:', error);
        }
      }

      document.getElementById('formEdit').addEventListener('submit', async function (e) {
        e.preventDefault();

        const data = {
          nim: document.getElementById('nim').value,
          nama: document.getElementById('nama').value,
          prodi: document.getElementById('prodi').value,
          angkatan: document.getElementById('angkatan').value,
        };

        try {
          const response = await fetch(`${API_URL}/${mhsId}`, {
            method: 'PUT',
            headers: {
              'Content-Type': 'application/json',
              Authorization: `Bearer ${token}`,
            },
            body: JSON.stringify(data),
          });
          const result = await response.json();

          if (result.status === 'success') {
            Swal.fire({
              title: 'Berhasil Diperbarui!',
              text: result.message,
              icon: 'success',
              background: document.documentElement.classList.contains('dark') ? '#1e293b' : '#fff',
              color: document.documentElement.classList.contains('dark') ? '#fff' : '#545454',
            }).then(() => {
              // 4. Ubah ke dashboard.html
              window.location.href = 'dashboard.html';
            });
          }
        } catch (error) {
          Swal.fire('Error!', 'Gagal memperbarui data.', 'error');
        }
      });

      document.addEventListener('DOMContentLoaded', loadDetail);
    </script>
  </body>
</html>
